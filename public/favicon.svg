<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#1e1e1a"/>

  <!-- Grain boundaries — irregular polygonal microstructure -->
  <!-- Grain 1 (top-left, steel blue) -->
  <polygon points="2,2 14,2 12,8 6,10 2,7" fill="#4e79a7" opacity="0.88"/>
  <!-- Grain 2 (top-right, amber) -->
  <polygon points="14,2 30,2 30,10 20,11 12,8" fill="#f28e2b" opacity="0.88"/>
  <!-- Grain 3 (mid-left, teal) -->
  <polygon points="2,7 6,10 5,18 2,20" fill="#76b7b2" opacity="0.88"/>
  <!-- Grain 4 (center, red-ish) -->
  <polygon points="6,10 12,8 20,11 22,18 14,22 5,18" fill="#e15759" opacity="0.82"/>
  <!-- Grain 5 (right, green) -->
  <polygon points="20,11 30,10 30,22 22,18" fill="#59a14f" opacity="0.88"/>
  <!-- Grain 6 (bottom-left, purple) -->
  <polygon points="2,20 5,18 14,22 10,30 2,30" fill="#b07aa1" opacity="0.88"/>
  <!-- Grain 7 (bottom-center, orange) -->
  <polygon points="14,22 22,18 24,28 10,30" fill="#f28e2b" opacity="0.75"/>
  <!-- Grain 8 (bottom-right, blue) -->
  <polygon points="22,18 30,22 30,30 24,28" fill="#4e79a7" opacity="0.80"/>

  <!-- Grain boundaries — thin bright lines -->
  <line x1="14" y1="2" x2="12" y2="8" stroke="#fafaf5" stroke-width="0.6" opacity="0.6"/>
  <line x1="12" y1="8" x2="6" y2="10" stroke="#fafaf5" stroke-width="0.6" opacity="0.6"/>
  <line x1="6" y1="10" x2="2" y2="7" stroke="#fafaf5" stroke-width="0.6" opacity="0.6"/>
  <line x1="12" y1="8" x2="20" y2="11" stroke="#fafaf5" stroke-width="0.6" opacity="0.6"/>
  <line x1="20" y1="11" x2="30" y2="10" stroke="#fafaf5" stroke-width="0.6" opacity="0.6"/>
  <line x1="6" y1="10" x2="5" y2="18" stroke="#fafaf5" stroke-width="0.6" opacity="0.6"/>
  <line x1="5" y1="18" x2="14" y2="22" stroke="#fafaf5" stroke-width="0.6" opacity="0.6"/>
  <line x1="14" y1="22" x2="22" y2="18" stroke="#fafaf5" stroke-width="0.6" opacity="0.6"/>
  <line x1="22" y1="18" x2="30" y2="22" stroke="#fafaf5" stroke-width="0.6" opacity="0.6"/>
  <line x1="14" y1="22" x2="10" y2="30" stroke="#fafaf5" stroke-width="0.6" opacity="0.6"/>
  <line x1="22" y1="18" x2="24" y2="28" stroke="#fafaf5" stroke-width="0.6" opacity="0.6"/>
  <line x1="20" y1="11" x2="22" y2="18" stroke="#fafaf5" stroke-width="0.6" opacity="0.6"/>
  <line x1="5" y1="18" x2="2" y2="20" stroke="#fafaf5" stroke-width="0.6" opacity="0.6"/>
</svg>
